name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ed25519 private key used by Tauri to sign updater artifacts (.sig files).
          # Store the key value in repo Settings → Secrets → TAURI_SIGNING_PRIVATE_KEY.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # Key was generated without a password; variable must still be present but empty.
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Export Invoice ${{ github.ref_name }}'
          releaseBody: |
            ## What's new in ${{ github.ref_name }}

            ### Bug fix — Database File picker (Settings)
            - Fixed a **"forbidden path"** runtime error that prevented the Browse button from writing or clearing `selected_db.txt` in the app config directory
            - Root cause: the Tauri capability granted the `write_text_file`/`remove`/`exists` commands but no path scope for `%APPDATA%\com.exportinvoice.app`; added `fs:scope-appconfig-recursive` to resolve it
            - Export / PDF / Excel save flows are unaffected (they use dialog-returned paths which are scoped automatically by Tauri)

            ---
            Download the installer below (**.msi** for enterprise/silent install, **.exe** for standard setup).
          releaseDraft: false
          prerelease: false
          # Tells tauri-action to create and upload latest.json after the build.
          # The bundler knows to produce .sig files because bundle.createUpdaterArtifacts
          # is set to true in tauri.conf.json.
          includeUpdaterJson: true
