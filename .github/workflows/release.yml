name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Rust unit tests
        run: cargo test
        working-directory: src-tauri

      - name: TypeScript type check
        run: node node_modules/typescript/bin/tsc --noEmit

      - name: Frontend tests
        run: npm test -- --run

      - name: Frontend production build
        run: npm run build

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ed25519 private key used by Tauri to sign updater artifacts (.sig files).
          # Store the key value in repo Settings → Secrets → TAURI_SIGNING_PRIVATE_KEY.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # Key was generated without a password; variable must still be present but empty.
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Export Invoice ${{ github.ref_name }}'
          releaseBody: |
            ## Export Invoice ${{ github.ref_name }} — Production release

            First production-grade release: security hardening, data integrity, resilience, and UI completion.

            ### Security
            - Session restore syncs Rust `AuthSession` after reload
            - Admin IPC requires admin role; PIN commands require session
            - SQL read gating until authenticated (v1.0 product rule)
            - Dual-layer field validation (Zod + Rust)

            ### Reliability
            - Startup-safe application logging (`logs/app.log`)
            - Admin log viewer, error boundary, centralized error messages
            - Read retry/backoff on list hooks

            ### UX
            - Shared PageHeader, EmptyState, ConfirmDialog, loaders
            - Legacy screens aligned to design system; sorting, date filters, draft auto-save

            ---
            Download the installer below (**.msi** for enterprise/silent install, **.nsis** setup for standard install).
            Updater manifest `latest.json` included when signing secret is configured.
          releaseDraft: false
          prerelease: false
          # Tells tauri-action to create and upload latest.json after the build.
          # The bundler knows to produce .sig files because bundle.createUpdaterArtifacts
          # is set to true in tauri.conf.json.
          includeUpdaterJson: true
