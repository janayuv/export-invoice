name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ed25519 private key used by Tauri to sign updater artifacts (.sig files).
          # Store the key value in repo Settings → Secrets → TAURI_SIGNING_PRIVATE_KEY.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # Key was generated without a password; variable must still be present but empty.
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Export Invoice ${{ github.ref_name }}'
          releaseBody: |
            ## What's new in ${{ github.ref_name }}

            ### Theme & Appearance Overhaul
            - Full **shadcn-style theme** applied across the app with a consistent token-based color system
            - **Light / Dark / System** theme switcher (powered by next-themes) in the sidebar footer; selection persists across restarts
            - Refreshed **sidebar shell** and **login / first-time-setup** screens to match the new theme
            - Reworked all forms and screens (Customers, New Invoice, New Entry, New Purchase Order, lists, dialogs, selects, comboboxes, line-item tables) to use theme tokens so they adapt cleanly to light and dark modes

            ### Consistency & Polish
            - Unified card surfaces, spacing, table row density, button hierarchy, section headers, and empty states
            - Fixed color token plumbing so surfaces, borders, popovers, and opacity variants render correctly in both modes

            ---
            Download the installer below (**.msi** for enterprise/silent install, **.exe** for standard setup).
          releaseDraft: false
          prerelease: false
          # Tells tauri-action to create and upload latest.json after the build.
          # The bundler knows to produce .sig files because bundle.createUpdaterArtifacts
          # is set to true in tauri.conf.json.
          includeUpdaterJson: true
